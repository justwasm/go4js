name: Build and Release Go Toolchain

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build (leave empty for default branch)'
        required: false
        default: ''
      version:
        description: 'Release version tag (e.g. go1.27.0-justwasm.1)'
        required: true
        default: 'go1.27.0-justwasm.1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: js
            goarch: wasm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Capture actual checked-out revision
        run: |
          echo "sha=$(git rev-parse HEAD)" > revision.txt
          echo "ref=${{ inputs.ref || github.ref_name }}" >> revision.txt

      - name: Set up Go bootstrap (go1.26)
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Set GOROOT_BOOTSTRAP
        run: echo "GOROOT_BOOTSTRAP=$(go env GOROOT)" >> "$GITHUB_ENV"

      - name: Create GOROOT VERSION file
        run: |
          echo "${{ inputs.version }}" > VERSION
          echo "time $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> VERSION

      - name: Build and package Go toolchain
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd src
          ./make.bash -distpack

      - name: Create minified distribution (strip tests, best compression)
        run: |
          cd pkg/distpack
          TGZ="${{ inputs.version }}.${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          bash ../../minify-go-distpack.sh "$TGZ"
          echo "min: $(du -h "${TGZ%.tar.gz}.min.tar.gz" | cut -f1)"

      - name: Generate Checksums
        run: |
          cd pkg/distpack
          PREFIX="${{ inputs.version }}.${{ matrix.goos }}-${{ matrix.goarch }}"
          for f in ${PREFIX}.* ${PREFIX}.min.tar.gz; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> ../../checksums.txt
            fi
          done

      - name: Prepare staging directory
        run: |
          mkdir staging
          PREFIX=${{ inputs.version }}.${{ matrix.goos }}-${{ matrix.goarch }}
          cp "pkg/distpack/${PREFIX}.tar.gz" staging/
          cp "pkg/distpack/${PREFIX}.min.tar.gz" staging/
          cp checksums.txt revision.txt staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: staging/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Load Revision Info
        id: revision
        run: |
          # Read from linux-amd64 folder (which must exist)
          SHA=$(grep sha artifacts/dist-linux-amd64/revision.txt | cut -d= -f2)
          REF=$(grep ref artifacts/dist-linux-amd64/revision.txt | cut -d= -f2)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Generate Unified Checksums Table
        id: checksums
        run: |
          echo "checksum_table<<EOF" >> "$GITHUB_OUTPUT"
          echo "| File | SHA256 |" >> "$GITHUB_OUTPUT"
          echo "|------|--------|" >> "$GITHUB_OUTPUT"
          cat artifacts/dist-*/checksums.txt | while read -r sha file; do
            name=$(basename "$file")
            echo "| \`$name\` | \`$sha\` |" >> "$GITHUB_OUTPUT"
          done
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Gather Release Assets
        run: |
          mkdir release_assets
          # Copy tar.gz and zip files from all dist folders to release_assets
          find artifacts/ -name "*.tar.gz" -exec cp {} release_assets/ \;
          find artifacts/ -name "*.zip" -exec cp {} release_assets/ \;

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            ## ${{ inputs.version }}

            Modified Go toolchain built from commit `${{ steps.revision.outputs.sha }}` (`${{ steps.revision.outputs.ref }}`).

            ### Download

            Two variants per platform:

            - **`*.tar.gz`** — full distribution (includes tests/testdata)
            - **`*.min.tar.gz`** — stripped distribution (`go/test/`, `testdata/`, `*_test.go`, fuzz files removed, max compression)

            ${{ steps.checksums.outputs.checksum_table }}

            ### Usage (Linux/macOS)

            ```bash
            # For Linux amd64 (full):
            tar -C /usr/local -xzf ${{ inputs.version }}.linux-amd64.tar.gz

            # For Linux amd64 (min):
            tar -C /usr/local -xzf ${{ inputs.version }}.linux-amd64.min.tar.gz

            # For macOS arm64:
            tar -C /usr/local -xzf ${{ inputs.version }}.darwin-arm64.tar.gz

            export PATH="/usr/local/go/bin:$PATH"
            ```
          artifacts: "release_assets/*"
          allowUpdates: true
          overwrite: true
          token: ${{ secrets.GITHUB_TOKEN }}
